<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyDNA Widget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:transparent;font-family:Arial,sans-serif;}
.container{border-radius:0 0 8px 8px;overflow:hidden;background:#111827;border:0.5px solid rgba(255,255,255,0.1);}
.dbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(77,168,255,0.08);border-bottom:0.5px solid rgba(77,168,255,0.15);}
.dlabel{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;font-weight:700;}
.source-badge{font-size:9px;padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0;}
.source-music{background:rgba(77,168,255,0.15);color:#4da8ff;border:0.5px solid rgba(77,168,255,0.3);}
.source-video{background:rgba(255,80,80,0.15);color:#ff6060;border:0.5px solid rgba(255,80,80,0.3);}
.dval{font-size:11px;color:rgba(255,255,255,0.35);font-style:italic;flex:1;}
.dval.live{color:#4da8ff;font-style:normal;font-weight:700;font-size:12px;}
.dsub{font-size:10px;color:rgba(255,255,255,0.3);margin-left:4px;}
.track-title-bar{padding:6px 14px;background:rgba(255,255,255,0.04);border-bottom:0.5px solid rgba(255,255,255,0.07);}
.track-title-bar span{font-size:12px;color:rgba(255,255,255,0.85);font-weight:700;}
.panel{padding:12px 14px;}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.slider-lbl{font-size:10px;color:rgba(255,255,255,0.5);}
.slider-section{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.logo img{width:32px;height:20px;object-fit:contain;mix-blend-mode:screen;flex-shrink:0;}
.srow{position:relative;height:26px;flex:1;display:flex;align-items:center;}
.strack{position:absolute;left:0;right:0;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;}
.sfill{position:absolute;left:0;height:3px;background:linear-gradient(90deg,#1a4fcc,#4da8ff);border-radius:2px;width:0%;}
.sthumb{position:absolute;width:26px;height:26px;object-fit:contain;mix-blend-mode:screen;pointer-events:none;transform:translateX(-50%);filter:drop-shadow(0 0 4px rgba(77,168,255,0.6));}
.sinput{position:absolute;left:0;right:0;width:100%;opacity:0;height:26px;cursor:pointer;-webkit-appearance:none;}
.idesc{font-size:10px;color:#4da8ff;min-height:14px;margin-bottom:8px;font-style:italic;padding-left:42px;}
.shint{font-size:10px;color:rgba(255,255,255,0.25);min-height:14px;margin-bottom:8px;font-style:italic;padding-left:42px;}
.divider{border:none;border-top:0.5px solid rgba(255,255,255,0.08);margin:8px 0;}
.emotions-row{display:flex;align-items:center;gap:8px;}
.elbl{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;flex-shrink:0;}
.etags{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.sbtn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;background:#1a2a3a;color:rgba(77,168,255,0.4);border:1px solid rgba(77,168,255,0.2);font-family:Arial,sans-serif;white-space:nowrap;flex-shrink:0;font-weight:700;}
.results-panel{padding:10px 14px;display:none;}
.res-track{font-size:13px;color:#fff;font-weight:700;margin-bottom:2px;}
.res-ty{font-size:11px;color:rgba(77,168,255,0.9);margin-bottom:8px;}
.res-title{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.res-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rbar-bg{flex:1;height:3px;background:rgba(100,160,255,0.2);border-radius:2px;overflow:hidden;}
.rbar{height:3px;border-radius:2px;width:0;transition:width 0.6s ease;}
.rpct{font-size:10px;color:rgba(255,255,255,0.35);width:28px;text-align:right;}
.no-track{padding:12px 14px;font-size:11px;color:rgba(255,255,255,0.3);font-style:italic;}
</style>
</head>

  var sfill = document.getElementById('sfill');
  var sthumb = document.getElementById('sthumb');
  var srow = document.getElementById('srow');
  var idesc = document.getElementById('idesc');

  etags.innerHTML = '';
  EMOTIONS.forEach(function(emotion) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = emotion;
    btn.style.cssText = 'padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);background:#1a1f2e;font-family:Arial,sans-serif;margin:0;outline:none;display:inline-block;';
    btn.setAttribute('data-emotion', emotion);
    btn.setAttribute('data-selected', 'false');
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (submitted) return;
      var em = this.getAttribute('data-emotion');
      var isSel = this.getAttribute('data-selected') === 'true';
      if (isSel) {
        this.setAttribute('data-selected', 'false');
        this.style.background = '#1a1f2e';
        this.style.color = 'rgba(255,255,255,0.7)';
        this.style.border = '1px solid rgba(255,255,255,0.25)';
        var idx = selected.indexOf(em);
        if (idx > -1) selected.splice(idx, 1);
      } else {
        this.setAttribute('data-selected', 'true');
        this.style.background = 'linear-gradient(135deg,#1a4fcc,#4da8ff)';
        this.style.color = '#ffffff';
        this.style.border = '1px solid transparent';
        if (selected.indexOf(em) === -1) selected.push(em);
      }
      updateBtn();
    });
    etags.appendChild(btn);
  });

  function updateSlider(v) {
    var p = v / 10;
    var w = srow.offsetWidth;
    sfill.style.width = (p * 100) + '%';
    sthumb.style.left = (p * (w - 26) + 13) + 'px';
  }

  function updateBtn() {
    var ready = TRACK_ID && touched && selected.length > 0;
    sbtn.disabled = !ready;
    if (ready) {
      sbtn.style.background = 'rgba(77,168,255,0.2)';
      sbtn.style.color = '#4da8ff';
      sbtn.style.borderColor = 'rgba(77,168,255,0.5)';
      sbtn.style.cursor = 'pointer';
    } else {
      sbtn.style.background = '#1a2a3a';
      sbtn.style.color = 'rgba(77,168,255,0.4)';
      sbtn.style.borderColor = 'rgba(77,168,255,0.2)';
      sbtn.style.cursor = 'default';
    }
  }

  sinput.addEventListener('input', function() {
    intensity = parseInt(this.value);
    touched = true;
    updateSlider(intensity);
    idesc.style.cssText = 'font-size:10px;color:#4da8ff;min-height:14px;margin-bottom:8px;font-style:italic;padding-left:42px;';
    idesc.textContent = intensity + '/10 — ' + LABELS[intensity];
    updateBtn();
  });

  updateSlider(0);

  sbtn.addEventListener('click', function(e) {
    e.preventDefault();
    if (submitted || !TRACK_ID || !touched || selected.length === 0) return;
    submitted = true;
    sbtn.textContent = '...';
    sbtn.disabled = true;

    fetch(SITE_URL + '/_functions/flydna_submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        trackId: TRACK_ID,
        trackTitle: TRACK_TITLE,
        intensity: intensity,
        emotions: selected.slice(),
        source: SOURCE
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      sbtn.textContent = '✓';
      var bd = JSON.parse(JSON.stringify(aggData.emotionBreakdown || {}));
      var nt = (aggData.totalResponses || 0) + 1;
      selected.forEach(function(e) { bd[e] = (bd[e] || 0) + 1; });
      document.getElementById('rating-panel').style.display = 'none';
      showResults(bd, nt);
      updateDominant(bd, nt);
    })
    .catch(function(err) {
      submitted = false;
      sbtn.textContent = 'Send';
      sbtn.disabled = false;
      updateBtn();
      console.error('FlyDNA submit error:', err);
    });
  });

  function showResults(bd, total) {
    var p = document.getElementById('results-panel');
    var el = selected.join(' · ');
    var resp = total === 1 ? '1 response' : total.toLocaleString() + ' responses';
    var h = '<div class="res-track">' + TRACK_TITLE + '</div>';
    h += '<div class="res-ty">FlyDNA™ recorded · ' + intensity + '/10 · ' + el + '</div>';
    h += '<div class="res-title">Community resonance — ' + resp + '</div>';
    var entries = Object.entries(bd).filter(function(x){return x[1]>0;}).sort(function(a,b){return b[1]-a[1];});
    entries.forEach(function(entry) {
      var n = entry[0], c = entry[1];
      var pct = Math.round(c/total*100);
      var m = selected.indexOf(n) > -1;
      var lblStyle = m ? 'color:#fff;font-weight:700;font-size:11px;width:76px;flex-shrink:0;' : 'font-size:11px;color:rgba(255,255,255,0.45);width:76px;flex-shrink:0;';
      var barColor = m ? 'linear-gradient(90deg,#1a4fcc,#4da8ff)' : 'rgba(100,160,255,0.5)';
      h += '<div class="res-row"><span style="' + lblStyle + '">' + n + (m?' ✓':'') + '</span>';
      h += '<div class="rbar-bg"><div class="rbar" id="rb-' + n + '" style="background:' + barColor + '"></div></div>';
      h += '<span class="rpct">' + pct + '%</span></div>';
    });
    p.innerHTML = h;
    p.style.display = 'block';
    setTimeout(function() {
      entries.forEach(function(entry) {
        var bar = document.getElementById('rb-' + entry[0]);
        if (bar) bar.style.width = Math.round(entry[1]/total*100) + '%';
      });
    }, 100);
  }

  function updateDominant(bd, total) {
    var d = '', mx = 0;
    Object.entries(bd).forEach(function(x){if(x[1]>mx){d=x[0];mx=x[1];}});
    var el = document.getElementById('dcontent');
    if (d && total > 0) {
      el.className = 'dval live';
      el.textContent = d;
      var sub = document.createElement('span');
      sub.className = 'dsub';
      var resp = total === 1 ? '1 response' : total.toLocaleString() + ' responses';
      sub.textContent = Math.round(mx/total*100) + '% of listeners · ' + resp;
      el.after(sub);
    }
  }

  function loadAggregate() {
    if (!TRACK_ID) return;
    fetch(SITE_URL + '/_functions/flydna_aggregate?trackId=' + encodeURIComponent(TRACK_ID))
      .then(function(r){return r.json();})
      .then(function(d){
        aggData = d;
        aggData.emotionBreakdown = d.emotionBreakdown || {};
        updateDominant(aggData.emotionBreakdown, aggData.totalResponses || 0);
      })
      .catch(function(){
        document.getElementById('dcontent').textContent = 'Be the first to rate this track';
      });
  }

  loadAggregate();
}
</script>
</body>
</html>
