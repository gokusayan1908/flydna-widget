<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:transparent;font-family:Arial,sans-serif;}
.container{border-radius:0 0 8px 8px;overflow:hidden;background:#111827;border:0.5px solid rgba(255,255,255,0.1);}
.dbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(77,168,255,0.08);border-bottom:0.5px solid rgba(77,168,255,0.15);}
.dlabel{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;font-weight:700;}
.dval{font-size:11px;color:rgba(255,255,255,0.35);font-style:italic;}
.dval.live{color:#4da8ff;font-style:normal;font-weight:700;font-size:12px;}
.dsub{font-size:10px;color:rgba(255,255,255,0.3);margin-left:4px;}
.track-title-bar{padding:6px 14px;background:rgba(255,255,255,0.04);border-bottom:0.5px solid rgba(255,255,255,0.07);}
.track-title-bar span{font-size:12px;color:rgba(255,255,255,0.85);font-weight:700;}
.panel{padding:12px 14px;}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.slider-lbl{font-size:10px;color:rgba(255,255,255,0.5);}
.slider-section{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.logo img{width:32px;height:20px;object-fit:contain;mix-blend-mode:screen;flex-shrink:0;}
.srow{position:relative;height:26px;flex:1;display:flex;align-items:center;}
.strack{position:absolute;left:0;right:0;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;}
.sfill{position:absolute;left:0;height:3px;background:linear-gradient(90deg,#1a4fcc,#4da8ff);border-radius:2px;width:0%;}
.sthumb{position:absolute;width:26px;height:26px;object-fit:contain;mix-blend-mode:screen;pointer-events:none;transform:translateX(-50%);filter:drop-shadow(0 0 4px rgba(77,168,255,0.6));}
.sinput{position:absolute;left:0;right:0;width:100%;opacity:0;height:26px;cursor:pointer;-webkit-appearance:none;}
.idesc{font-size:10px;color:#4da8ff;min-height:14px;margin-bottom:8px;font-style:italic;padding-left:42px;}
.shint{font-size:10px;color:rgba(255,255,255,0.25);min-height:14px;margin-bottom:8px;font-style:italic;padding-left:42px;}
.divider{border:none;border-top:0.5px solid rgba(255,255,255,0.08);margin:8px 0;}
.emotions-row{display:flex;align-items:center;gap:8px;}
.elbl{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;flex-shrink:0;}
.etags{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.etag{padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);background:transparent;font-family:Arial,sans-serif;transition:all 0.1s;}
.etag:hover{border-color:rgba(255,255,255,0.6);color:#fff;}
.etag.sel{background:linear-gradient(135deg,#1a4fcc,#4da8ff);color:#fff;border-color:transparent;}
.sbtn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;background:rgba(77,168,255,0.08);color:rgba(77,168,255,0.3);border:0.5px solid rgba(77,168,255,0.2);font-family:Arial,sans-serif;white-space:nowrap;flex-shrink:0;font-weight:700;transition:all 0.15s;}
.sbtn.ready{background:rgba(77,168,255,0.2);color:#4da8ff;border-color:rgba(77,168,255,0.5);}
.sbtn.ready:hover{background:rgba(77,168,255,0.35);color:#fff;}
.sbtn:disabled{cursor:default;}
.results-panel{padding:10px 14px;display:none;}
.res-track{font-size:13px;color:#fff;font-weight:700;margin-bottom:2px;}
.res-ty{font-size:11px;color:rgba(77,168,255,0.9);margin-bottom:8px;}
.res-title{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.res-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rlbl{font-size:11px;color:rgba(255,255,255,0.45);width:76px;flex-shrink:0;}
.rlbl.mine{color:#fff;font-weight:700;}
.rbar-bg{flex:1;height:3px;background:rgba(100,160,255,0.2);border-radius:2px;overflow:hidden;}
.rbar{height:3px;border-radius:2px;width:0;transition:width 0.6s ease;}
.rbar.mine{background:linear-gradient(90deg,#1a4fcc,#4da8ff);}
.rbar.other{background:rgba(100,160,255,0.5);}
.rpct{font-size:10px;color:rgba(255,255,255,0.35);width:28px;text-align:right;}
</style>

var EMOTIONS = ['Joy','Sadness','Energy','Love','Nostalgia','Peace','Hope','Wonder','Darkness','Passion'];
var LABELS = ['','Barely a flutter','A quiet stir','Something stirs','Gently touched','Noticeably felt','Clearly emotional','Deeply moved','Strongly felt','Overwhelming','Full emotional resonance'];
var intensity = 0, touched = false, selected = new Set(), submitted = false, aggData = {};

document.getElementById('track-label').textContent = TRACK_TITLE;

var etags = document.getElementById('etags');
EMOTIONS.forEach(function(e) {
  var b = document.createElement('button');
  b.className = 'etag'; b.textContent = e;
  b.onclick = function() {
    if (submitted) return;
    selected.has(e) ? (selected.delete(e), b.classList.remove('sel')) : (selected.add(e), b.classList.add('sel'));
    updateBtn();
  };
  etags.appendChild(b);
});

var sinput = document.getElementById('sinput');
var sfill = document.getElementById('sfill');
var sthumb = document.getElementById('sthumb');
var srow = document.getElementById('srow');
var idesc = document.getElementById('idesc');
var sbtn = document.getElementById('sbtn');

function updateSlider(v) {
  var p = v / 10, w = srow.offsetWidth;
  sfill.style.width = (p * 100) + '%';
  sthumb.style.left = (p * (w - 26) + 13) + 'px';
}
function updateBtn() {
  var r = touched && selected.size > 0;
  sbtn.disabled = !r;
  r ? sbtn.classList.add('ready') : sbtn.classList.remove('ready');
}
sinput.addEventListener('input', function() {
  intensity = parseInt(this.value); touched = true;
  updateSlider(intensity);
  idesc.className = 'idesc';
  idesc.textContent = intensity + '/10 — ' + LABELS[intensity];
  updateBtn();
});
window.addEventListener('load', function() { updateSlider(0); });
window.addEventListener('resize', function() { updateSlider(intensity); });

sbtn.onclick = async function() {
  if (submitted || !touched || selected.size === 0) return;
  submitted = true;
  sbtn.textContent = '...'; sbtn.disabled = true; sbtn.classList.remove('ready');
  try {
    await fetch(SITE_URL + '/_functions/flydna_submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({trackId: TRACK_ID, trackTitle: TRACK_TITLE, intensity: intensity, emotions: Array.from(selected)})
    });
  } catch(e) {}
  var bd = Object.assign({}, aggData.emotionBreakdown || {});
  var nt = (aggData.totalResponses || 0) + 1;
  selected.forEach(function(e) { bd[e] = (bd[e] || 0) + 1; });
  document.getElementById('rating-panel').style.display = 'none';
  showResults(bd, nt);
  updateDominant(bd, nt);
};

function showResults(bd, total) {
  var p = document.getElementById('results-panel');
  var el = Array.from(selected).join(' · ');
  var resp = total === 1 ? '1 response' : total.toLocaleString() + ' responses';
  var h = '<div class="res-track">' + TRACK_TITLE + '</div>';
  h += '<div class="res-ty">FlyDNA™ recorded · ' + intensity + '/10 · ' + el + '</div>';
  h += '<div class="res-title">Community resonance — ' + resp + '</div>';
  var sorted = Object.entries(bd).filter(function(x) { return x[1] > 0; }).sort(function(a,b) { return b[1]-a[1]; });
  sorted.forEach(function(entry) {
    var n = entry[0], c = entry[1];
    var pct = Math.round(c / total * 100);
    var m = selected.has(n);
    h += '<div class="res-row"><span class="rlbl' + (m?' mine':'') + '">' + n + (m?' ✓':'') + '</span><div class="rbar-bg"><div class="rbar ' + (m?'mine':'other') + '" id="rb-' + n + '"></div></div><span class="rpct">' + pct + '%</span></div>';
  });
  p.innerHTML = h; p.style.display = 'block';
  setTimeout(function() {
    sorted.forEach(function(entry) {
      var b = document.getElementById('rb-' + entry[0]);
      if (b) b.style.width = Math.round(entry[1] / total * 100) + '%';
    });
  }, 100);
}

function updateDominant(bd, total) {
  var d = '', mx = 0;
  Object.entries(bd).forEach(function(x) { if (x[1] > mx) { d = x[0]; mx = x[1]; } });
  var el = document.getElementById('dcontent');
  if (d && total > 0) {
    el.className = 'dval live'; el.textContent = d;
    var sub = document.createElement('span'); sub.className = 'dsub';
    var resp = total === 1 ? '1 response' : total.toLocaleString() + ' responses';
    sub.textContent = Math.round(mx / total * 100) + '% of listeners · ' + resp;
    el.after(sub);
  }
}

async function loadAggregate() {
  try {
    var r = await fetch(SITE_URL + '/_functions/flydna_aggregate?trackId=' + TRACK_ID);
    var d = await r.json();
    aggData = d; aggData.emotionBreakdown = d.emotionBreakdown || {};
    updateDominant(aggData.emotionBreakdown, aggData.totalResponses || 0);
  } catch(e) {
    document.getElementById('dcontent').textContent = 'Be the first to rate this track';
  }
}
loadAggregate();
</script>

</body></html>
